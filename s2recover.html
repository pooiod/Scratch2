<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Scratch2 Project Recover</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        html,
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background: #fff;
            width: 100vw;
            padding: 1em;
            text-align: center;
            font-size: 1.6em;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2em;
            width: 100%;
            max-width: 500px;
        }

        input,
        button {
            margin: 0.5em 0;
            padding: 0.6em;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            background: #fff;
            color: #333;
        }

        button {
            cursor: pointer;
            background: #4CAF50;
            color: #fff;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #388E3C;
        }

        #error {
            color: #c00;
            background: #fee;
            padding: 1em;
            margin: 1em 0;
            border: 1px solid #f99;
            display: none;
            border-radius: 6px;
            text-align: center;
        }

        #loader {
            display: none;
            margin: 1em 0;
            padding: 1em;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 100%;
            text-align: center;
        }

        p {
            max-width: 800px;
            margin: 1em auto;
            padding: 0.8em 1em;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95em;
            line-height: 1.5em;
            color: #333;
        }
    </style>
</head>

<body>
    <header>Scratch2 Project Recover Thingy</header>
    <p>Please note that this uses an archived version of the legacy projects api that only existed for a short time.
        <br>However, if you manage to get a project json on something like archive.org, this will still be able to
        recover its assets.</p>
    <main>
        <input id="projectId" placeholder="Project ID" value="105500895">
        <button id="recover">Open from ID</button>
        <button id="loadJsonFileBtn">Open project from JSON</button>
        <button id="downloadJsonBtn">Download project JSON</button>
        <input type="file" id="jsonFileInput" style="display:none" accept=".json,application/json">
        <div id="loader">Loading...</div>
        <div id="error"></div>
    </main>
    <script>
        function showError(msg) {
            document.getElementById("error").innerText = msg;
            document.getElementById("error").style.display = "block";
        }
        function hideError() {
            document.getElementById("error").style.display = "none";
        }
        function showLoader(msg) {
            const loader = document.getElementById("loader");
            loader.innerText = msg;
            loader.style.display = "block";
        }
        function hideLoader() {
            document.getElementById("loader").style.display = "none";
        }
        async function fetchWithRetries(url, retries = 4) {
            for (let i = 0; i < retries; i++) {
                try {
                    let res = await fetch(url);
                    if (!res.ok) throw new Error("Fetch failed");
                    return res;
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 500));
                }
            }
        }
        async function uploadToCatbox(blob) {
            showLoader("Uploading SB2 to Catbox...");
            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('time', '1h');
            formData.append('fileToUpload', blob);
            const response = await fetch('https://litterbox.catbox.moe/resources/internals/api.php', { method: 'POST', body: formData });
            if (!response.ok) throw new Error('File upload failed');
            const url = await response.text();
            return url.trim();
        }
        async function createSB2AndUpload(project) {
            showLoader("Creating SB2...");
            let zip = new JSZip();
            zip.file("project.json", JSON.stringify(project));
            let imgs = new Set(), snds = new Set();
            (project.targets || []).forEach(t => {
                (t.costumes || []).forEach(c => imgs.add((c.assetId || c.md5 || "") + ""));
                (t.sounds || []).forEach(s => snds.add((s.assetId || s.md5 || "") + ""));
            });
            for (let i of imgs) zip.file(i + ".png", new Uint8Array([137, 80, 78, 71, 13, 10, 26, 10]));
            for (let s of snds) zip.file(s + ".wav", new Uint8Array([82, 73, 70, 70, 36, 0, 0, 0, 87, 65, 86, 69]));
            showLoader("Generating SB2 file...");
            let blob = await zip.generateAsync({ type: "blob" });
            return await uploadToCatbox(blob);
        }
        document.getElementById("downloadJsonBtn").onclick = () => {
            let id = document.getElementById("projectId").value || "105500895";
            window.open("https://web.archive.org/web/20180104041518id_/https://scratch2-projects.s3.amazonaws.com/" + id, "_blank");
        };
        document.getElementById("loadJsonFileBtn").onclick = () => document.getElementById("jsonFileInput").click();
        document.getElementById("jsonFileInput").onchange = async e => {
            hideError();
            let f = e.target.files[0];
            if (!f) return;
            if (!f.type.includes("json") && !f.name.endsWith(".json")) { showError("Please select a valid JSON file"); return; }
            try {
                let text = await f.text();
                let project = JSON.parse(text);
                let url = await createSB2AndUpload(project);
                hideLoader();
                if (window.self !== window.top) {
                    parent.postMessage({ success: true, url: url }, "*");
                } else {
                    window.location.href = "https://turbowarp.org/?project_url=" + encodeURIComponent(url);
                }
            } catch (err) {
                hideLoader();
                if (window.self !== window.top) {
                    parent.postMessage({ success: false, error: err.message }, "*");
                } else {
                    showError("Error: " + err.message);
                }
            }
        };
        document.getElementById("recover").onclick = async () => {
            hideError();
            let id = document.getElementById("projectId").value || "3";
            let proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://web.archive.org/web/20180104041518id_/https://scratch2-projects.s3.amazonaws.com/" + id);
            try {
                showLoader("Fetching project JSON from archive.org...");
                let res = await fetchWithRetries(proxy, 4);
                let project = await res.json();
                let url = await createSB2AndUpload(project);
                hideLoader();
                if (window.self !== window.top) {
                    parent.postMessage({ success: true, url: url }, "*");
                } else {
                    window.location.href = "https://turbowarp.org/?project_url=" + encodeURIComponent(url);
                }
            } catch (err) {
                hideLoader();
                if (window.self !== window.top) {
                    parent.postMessage({ success: false, error: err.message }, "*");
                } else {
                    showError("Error: " + err.message);
                }
            }
        };
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const pid = params.get('p');
            if (pid) {
                document.getElementById("projectId").value = pid;
                document.getElementById("recover").click();
            }
        });
    </script>
</body>
</html>
