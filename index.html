<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Scratch SB2 Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Inter, system-ui;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh
        }

        #card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 32px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4)
        }

        h1 {
            margin: 0 0 16px;
            font-size: 28px;
            font-weight: 800
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 16px;
            margin-bottom: 16px
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            background: #00e5ff;
            cursor: pointer
        }

        button:active {
            transform: scale(0.98)
        }

        #log {
            margin-top: 16px;
            font-size: 13px;
            white-space: pre-wrap;
            opacity: 0.8
        }
    </style>
</head>

<body>
    <div id="card">
        <h1>Scratch SB2 Downloader</h1>
        <input id="pid" placeholder="Scratch project ID or URL">
        <button id="go">Download .sb2</button>
        <div id="log"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/2.5.0/jszip.min.js"></script>

    <script>
        function log(t) {
            $("#log").text(t + "\n" + $("#log").text())
        }

        function extractId(v) {
            if (v.includes("http")) {
                var p = v.split("/")
                for (var i = 0; i < p.length; i++) {
                    if (/^\d+$/.test(p[i])) return p[i]
                }
            }
            return v.replace(/\D/g, "")
        }

        async function fetchJSON(url) {
            return fetch(url).then(r => r.json())
        }

        async function fetchBinary(url) {
            return fetch(url).then(r => r.arrayBuffer())
        }

        async function buildSB2(id) {
            log("Fetching project.json")
            var project = await fetchJSON("https://projects.scratch.mit.edu/" + id)
            var zip = new JSZip()
            zip.file("project.json", JSON.stringify(project))
            var assets = []
            project.children.forEach(s => {
                if (s.costumes) {
                    s.costumes.forEach(c => {
                        assets.push({ md5: c.baseLayerMD5, ext: c.baseLayerMD5.split(".").pop() })
                    })
                }
                if (s.sounds) {
                    s.sounds.forEach(a => {
                        assets.push({ md5: a.md5, ext: a.md5.split(".").pop() })
                    })
                }
            })
            for (var i = 0; i < assets.length; i++) {
                var a = assets[i]
                log("Fetching " + a.md5)
                var data = await fetchBinary("https://assets.scratch.mit.edu/internalapi/asset/" + a.md5 + "/get/")
                zip.file(a.md5, data)
            }
            log("Building sb2")
            var blob = await zip.generateAsync({ type: "base64" })
            JSdownloadSB2(blob, "project-" + id + ".sb2")
        }

        window.JSdownloadSB2 = function (data, filename) {
            var a = document.createElement("a")
            a.href = "data:application/octet-stream;base64," + data
            a.download = filename
            document.body.appendChild(a)
            a.click()
            a.remove()
        }

        $("#go").on("click", function () {
            $("#log").text("")
            var id = extractId($("#pid").val())
            if (!id) return
            buildSB2(id)
        })

        var q = new URLSearchParams(location.search).get("id")
        if (q) {
            $("#pid").val(q)
            $("#go").click()
        }
    </script>
</body>
</html>
