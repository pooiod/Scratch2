<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch2 Editor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #d9d9d9;
        }

        .header {
            background: linear-gradient(to bottom, #a0a0a0 0%, #808080 100%);
            padding: 12px 20px;
            border-bottom: 1px solid #666;
        }

        .header h1 {
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .content {
            padding: 30px;
            text-align: center;
        }

        .content h2 {
            font-size: 20px;
            margin-bottom: 25px;
            color: #575e75;
            font-weight: normal;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
            text-align: center;
            border: 1px solid #d0d0d0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-blue {
            background: linear-gradient(to bottom, #4cb1f6 0%, #1593e9 100%);
            color: white;
            border-color: #0e7ac4;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }

        .btn-blue:hover {
            background: linear-gradient(to bottom, #5dc0ff 0%, #2fa6f5 100%);
        }

        .btn-grey {
            background: linear-gradient(to bottom, #ffffff 0%, #f0f0f0 100%);
            color: #575e75;
        }

        .btn-grey:hover {
            background: linear-gradient(to bottom, #ffffff 0%, #e6e6e6 100%);
        }

        .btn-white {
            background: transparent;
            border: 1px dashed #b0b0b0;
            color: #888;
            box-shadow: none;
        }

        .btn-white:hover {
            border-color: #666;
            color: #555;
            background-color: #f9f9f9;
        }

        [data-tooltip] {
            position: relative;
        }

        [data-tooltip]:after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            /* visibility: hidden; */
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            margin-bottom: 8px;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-weight: normal;
            text-shadow: none;
            transform: translateX(-50%) translateY(2px);
        }

        [data-tooltip]:before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #333;
            opacity: 0;
            /* visibility: hidden; */
            transition: opacity 0.2s ease;
            margin-bottom: -4px;
            pointer-events: none;
            z-index: 10;
        }

        [data-tooltip]:hover:after,
        [data-tooltip]:hover:before {
            opacity: 1;
            /* visibility: visible; */
        }

        [data-tooltip]:hover:after {
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>No JavaScript hook in flash emultor</h1>
        </div>
        <div class="content">
            <h2>Your project could not be loaded <br>select an option on what you would like to do</h2>

            <div class="btn-group">
                <a href="https://pooiod7.itch.io/scratch2" class="btn btn-grey" target="_blank" data-tooltip="Download the windows app to run Scratch2 with native flash (not offline)">
                    Download App
                </a>

                <a id="browser-link" href="#" class="btn btn-grey" data-tooltip="Uses a IE11 inside your browser (streamed from ieonchrome.com)">
                    Continue in Internet Explorer 11
                </a>

                <a id="download-link" href="#" class="btn btn-white" data-tooltip="Save the project file to your device for use in the actual Scratch 2 offline editor">
                    Download Project File
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentHash = window.location.hash;
            
            const browserLink = document.getElementById('browser-link');
            const downloadLink = document.getElementById('download-link');

            browserLink.href = 'https://ie11.ieonchrome.com/#scratchflash.pages.dev' + currentHash;
            downloadLink.href = '/download' + currentHash;
        });
    </script>
</body>
</html>
