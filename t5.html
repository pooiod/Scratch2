<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Simple Test</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>
#log{white-space:pre-wrap;font-family:monospace}
.download{background:#eef}
</style>
</head>
<body>
<pre id="log"></pre>
<script>
function JSwillDownload(){
    return value.length>0
}
function startDownload(v){
    const a=document.createElement('a')
    a.href='data:text/plain,'+encodeURIComponent(v)
    a.download='value.txt'
    a.click()
}
var value=decodeURI(location.hash.slice(1))
$("#log").text(value+"\n"+$("#log").text())
if(value.includes('#')){
    value=value.split('#').pop()
}else if(value.startsWith('http')){
    value=value.split('/').find(part=>/^\d+$/.test(part))||''
}
$("#log").text(value+"\n"+$("#log").text())
$("#log").text(JSwillDownload()+"\n"+$("#log").text())
if(JSwillDownload()){
    document.body.classList.add('download')
    startDownload(value)
}
</script>
</body>
</html>
