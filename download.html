<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Scratch SB2 Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0f1220;
            font-family: Inter, system-ui, sans-serif;
            color: #fff;
        }

        .container {
            max-width: 420px;
            margin: auto;
            padding-top: 20vh;
            text-align: center;
        }

        .card {
            background: #171a2e;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            opacity: .7;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
            background: #0f1220;
            color: #fff;
        }

        button {
            margin-top: 16px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #6c7cff;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #7d8cff;
        }

        #log {
            margin-top: 20px;
            font-size: 13px;
            opacity: .6;
            white-space: pre-line;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <h1>Scratch SB2 Downloader</h1>
            <p>Paste a Scratch project ID or URL</p>
            <input id="projectId" placeholder="e.g. 123456789">
            <button onclick="go()">Download</button>
            <div id="log"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/2.5.0/jszip.min.js"></script>
    <script src="json.js"></script>
    <script src="download.js"></script>

    <script>
        window.gotZipBase64 = function (content) {
            $("#log").text("Downloading SB2...");
            JSdownloadSB2(content, "project.sb2");
            $("#log").text("Download complete");
        };

        window.JSdownloadSB2 = function (data, filename) {
            var a = document.createElement("a");
            a.href = "data:application/octet-stream;charset=utf-16le;base64," + data;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        function parseValue(v) {
            if (v.includes("#")) return v.split("#").pop();
            if (v.startsWith("http")) return v.split("/").find(p => /^\d+$/.test(p)) || "";
            return v;
        }

        function go() {
            var v = parseValue(document.getElementById("projectId").value.trim());
            if (!v) return;
            $("#log").text("Fetching project...");
            startDownload(v);
        }

        var value = new URLSearchParams(location.search).get("id") || decodeURI(location.hash.slice(1));
        if (value) {
            value = parseValue(value);
            document.getElementById("projectId").value = value;
            startDownload(value);
        }
    </script>

</body>
</html>
