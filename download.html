<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Scratch Project Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/2.5.0/jszip.min.js"></script>
    <script src="json.js"></script>
    <script src="download.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #f7f9fc;
            font-family: Inter, system-ui, sans-serif;
            color: #1f2937
        }

        .container {
            max-width: 520px;
            margin: 80px auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
            padding: 32px
        }

        h1 {
            margin: 0 0 12px;
            font-size: 24px;
            font-weight: 600
        }

        p {
            margin: 0 0 24px;
            color: #6b7280
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 16px;
            outline: none
        }

        input:focus {
            border-color: #6366f1
        }

        button {
            margin-top: 16px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #6366f1;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer
        }

        button:hover {
            background: #4f46e5
        }

        #downloader {
            margin-top: 24px;
            overflow: hidden
        }

        #log {
            font-size: 13px;
            white-space: pre-wrap;
            color: #374151
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
            text-align: center
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Scratch Downloader</h1>
        <p>Paste a Scratch project link or ID to download it as an SB2 file.</p>
        <input id="projectId" placeholder="Project ID or URL">
        <button id="go">Download</button>
        <div id="downloader">
            <div id="log"></div>
        </div>
        <div class="footer">Light mode · No Flash · Direct SB2</div>
    </div>

    <script>
        window.gotZipBase64 = function (content) {
            $("#log").text("Preparing download\n" + $("#log").text())
            JSdownloadSB2(content, "project.sb2")
        }

        JSdownloadSB2 = function (data, filename) {
            var a = document.createElement("a")
            a.href = "data:application/octet-stream;base64," + data
            a.download = filename
            document.body.appendChild(a)
            a.click()
            document.body.removeChild(a)
        }

        function extractId(value) {
            if (!value) return ""
            if (value.includes("#")) return value.split("#").pop()
            if (value.startsWith("http")) {
                var p = value.split("/")
                for (var i = 0; i < p.length; i++) {
                    if (/^\d+$/.test(p[i])) return p[i]
                }
            }
            return value
        }

        $("#go").on("click", function () {
            var value = extractId($("#projectId").val().trim())
            if (!value) return
            $("#log").text("Starting download\n")
            startDownload(value)
        })

        var value = new URLSearchParams(window.location.search).get("id") || decodeURI(location.hash.slice(1))
        value = extractId(value)
        if (value) {
            $("#projectId").val(value)
            $("#log").text("Starting download\n")
            startDownload(value)
        }
    </script>
</body>
</html>
