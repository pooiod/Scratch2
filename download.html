<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>SB2 Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/2.5.0/jszip.min.js"></script>
    <script src="json.js"></script>
    <script src="download.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #f3f4f6;
            font-family: Inter, system-ui, sans-serif;
            color: #111827
        }

        .app {
            max-width: 480px;
            margin: 80px auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 32px
        }

        h1 {
            margin: 0 0 20px;
            font-size: 22px;
            font-weight: 600
        }

        input {
            width: calc(100% - 35px);
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px
        }

        button {
            margin-top: 14px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer
        }

        button:active {
            background: #1d4ed8
        }

        #downloader {
            margin-top: 24px
        }

        #progressWrap {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
            opacity: 0
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: #2563eb;
            transition: width .2s linear
        }

        #log {
            margin-top: 10px;
            font-size: 13px;
            white-space: pre-wrap;
            color: #4b5563
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>SB2 Downloader</h1>
        <input id="projectId" placeholder="Project ID or URL">
        <button id="go">Download</button>
        <div id="downloader">
            <div id="progressWrap">
                <div id="progressBar"></div>
            </div>
            <div id="log"></div>
        </div>
    </div>

    <script>
        var progressTimer
        function startProgress() {
            $("#progressWrap").css("opacity", 1)
            $("#progressBar").css("width", "0%")
            var p = 0
            progressTimer = setInterval(function () {
                p = Math.min(p + Math.random() * 8, 90)
                $("#progressBar").css("width", p + "%")
            }, 200)
        }

        window.gotZipBase64 = function (content) {
            clearInterval(progressTimer)
            $("#progressBar").css("width", "100%")
            JSdownloadSB2(content, DownloadedTitle+".sb2")
        }

        JSdownloadSB2 = function (data, filename) {
            var a = document.createElement("a")
            a.href = "data:application/octet-stream;base64," + data
            a.download = filename
            document.body.appendChild(a)
            a.click()
            document.body.removeChild(a)
        }

        function extractId(v) {
            if (!v) return ""
            if (v.includes("#")) return v.split("#").pop()
            if (v.startsWith("http")) {
                var p = v.split("/")
                for (var i = 0; i < p.length; i++) {
                    if (/^\d+$/.test(p[i])) return p[i]
                }
            }
            return v
        }

        $("#go").on("click", function () {
            var v = extractId($("#projectId").val().trim())
            if (!v) return
            $("#log").text("Downloading\n")
            startProgress()
            startDownload(v)
        })

        var value = new URLSearchParams(window.location.search).get("id") || decodeURI(location.hash.slice(1))
        value = extractId(value)
        if (value) {
            $("#projectId").val(value)
            $("#log").text("Downloading\n")
            startProgress()
            startDownload(value)
        }
    </script>
</body>
</html>
